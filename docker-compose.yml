services:
  postgres:
    image: postgres:16
    container_name: researchos_postgres
    environment:
      POSTGRES_USER: researchos
      POSTGRES_PASSWORD: researchos
      POSTGRES_DB: researchos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: researchos_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: researchos_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: